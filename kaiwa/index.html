<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaiwa - The Kanji Map</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #F8F7F4;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            overflow: hidden;
        }

        h1 {
            font-size: 4rem;
            color: #37474F;
            letter-spacing: 3px;
            font-weight: 900;
        }

        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            padding: 12px 24px;
            background-color: #FFFFFF;
            color: #37474F;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s, background-color 0.2s;
        }

        .back-btn:hover {
            background-color: #f0f0f0;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div id="loader" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #37474F; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center;">
        <div style="width: 200px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden;">
            <div class="loader-logo-fill-bar" style="width: 100%; height: 100%; background: #fff; transform-origin: left; transform: scaleX(1);"></div>
        </div>
    </div>

    <a href="../index.html" class="back-btn">Quay lại trang chính</a>

    <h1>thekanjimap</h1>

</body>
</html>
